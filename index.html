<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Noto+Sans+Gurmukhi:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fdf6e3; font-family: 'Noto Sans Gurmukhi', sans-serif; }
        .gurbani-text { color: #2d3436; line-height: 2; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-2xl w-full bg-white p-12 rounded-lg shadow-xl border-t-8 border-orange-400 text-center">
        <h1 id="gurmukhi" class="text-3xl md:text-4xl mb-8 gurbani-text">Loading Mukhwak...</h1>
        <hr class="my-6 border-orange-100">
        <p id="translation" class="text-lg text-gray-600 italic font-serif">Connecting to Google Drive...</p>
        
        <div class="mt-10">
            <audio id="bg-audio" loop></audio>
            <button onclick="toggleAudio()" id="playBtn" class="bg-orange-500 text-white px-6 py-2 rounded-full hover:bg-orange-600 transition">
                Listen to Background Score
            </button>
        </div>
    </div>

    <script>
        const API_URL = "YOUR_APPS_SCRIPT_URL_HERE";

        async function loadDailyMessage() {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            document.getElementById('gurmukhi').innerText = data.gurmukhi;
            document.getElementById('translation').innerText = data.translation;
            // Note: You will need the direct link to the mp3 file from Drive
            // Usually: https://drive.google.com/uc?export=download&id=FILE_ID
        }

        function toggleAudio() {
            const audio = document.getElementById('bg-audio');
            return audio.paused ? audio.play() : audio.pause();
        }

        loadDailyMessage();
    </script>
</body>
</html>
